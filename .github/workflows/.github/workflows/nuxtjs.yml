# Professional GitHub Actions workflow for Nuxt.js applications
# This workflow builds and deploys a Nuxt.js site to GitHub Pages
# It runs on pushes to the 'staging' branch and can also be triggered manually.

name: Deploy Nuxt.js to GitHub Pages

# Trigger events
on:
  # Run on push to the staging branch
  push:
    branches:
      - staging
    paths-ignore:
      - 'README.md'
      - '.github/**'
      - 'docs/**'

  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Permissions for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Concurrency control – only one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

# Environment variables
env:
  NODE_VERSION: '20.x'
  BUILD_DIR: '.output/public'  # Nuxt 3+ output directory

jobs:
  # Job 1: Lint and test the code
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run linting
        run: npm run lint || echo "No lint script found"

      - name: Run type checking
        run: npm run typecheck || echo "No typecheck script found"

      - name: Run tests
        run: npm run test || echo "No test script found"

  # Job 2: Build and deploy the application
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: quality-checks
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Step 1: Checkout the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js with cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Step 3: Install dependencies (clean install)
      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Step 4: Build the Nuxt application
      - name: Build Nuxt application
        run: npm run build
        env:
          NUXT_PUBLIC_BASE_URL: ${{ vars.NUXT_PUBLIC_BASE_URL || '/' }}
          NODE_ENV: production

      # Step 5: Generate static site (if using SSG mode)
      # Uncomment if you're using `nuxt generate` instead of `nuxt build`
      # - name: Generate static site
      #   run: npm run generate
      #   env:
      #     NUXT_PUBLIC_BASE_URL: ${{ vars.NUXT_PUBLIC_BASE_URL || '/' }}

      # Step 6: Configure Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 7: Upload build artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_DIR }}
          exclude: |
            .git/
            .github/
            **/*.yml
            **/*.yaml

      # Step 8: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Job 3: Notify on failure (optional)
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: failure()
    steps:
      - name: Send notification (example)
        run: |
          echo "❌ Deployment failed! Check the logs for details."
          # You can integrate with Slack, Telegram, or email here
